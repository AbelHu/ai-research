# Model role -> provider mapping. Swapping a model is a config change here,
# never a code change. See docs/design-spec.md sections 7 and 7.2.

roles:
  triage: fast
  planner: quality
  drafter: quality
  extractor: fast
  embedder: embed
  # NOTE: web search is handled by the deterministic web.search skill (Bing),
  # not a model role - GitHub Models has no native web-search tool.

providers:
  fast:
    kind: github_copilot             # Route A: device-flow login (python -m app.cli.login)
    model: gpt-4o-mini               # bare model id (no {publisher}/ prefix)

  quality:
    kind: github_copilot
    model: gpt-4o

  embed:
    # GitHub Copilot has no embeddings endpoint, so the embedder stays on
    # GitHub Models (needs GITHUB_MODELS_TOKEN). Only used by vector search
    # (P5.2) - not by the live integration tests (triage/planner/drafter).
    kind: github_models
    model: openai/text-embedding-3-small
    api_key_env: GITHUB_MODELS_TOKEN
    org_env: GITHUB_ORG

  # Swap providers without code changes - e.g. BYOK for production rate limits.
  # The setup wizard's option C writes this for you: `python -m app.cli.setup`
  # (it stores the key in .env and references only its NAME here).
  # quality:
  #   kind: openai_compatible
  #   model: gpt-4o
  #   base_url: https://api.openai.com/v1
  #   api_mode: chat_completions   # request protocol (default; the only one wired today)
  #   api_key_env: OPENAI_API_KEY
  # local-quality:
  #   kind: ollama
  #   model: llama3.1:8b
  #   base_url: http://localhost:11434

  # --- Route A: GitHub Copilot via device-flow login (no PAT) ---------------
  # Prefer logging in with your GitHub account instead of minting a PAT? Run
  # `python -m app.cli.login`, then change the providers above to `kind:
  # github_copilot` (no api_key_env - the bearer comes from the device-flow
  # cache). Copilot uses bare model ids (e.g. `gpt-4o`), not `{publisher}/{model}`.
  # Example replacements for `fast` and `quality`:
  # fast:
  #   kind: github_copilot
  #   model: gpt-4o-mini
  # quality:
  #   kind: github_copilot
  #   model: gpt-4o
  # NOTE: GitHub Copilot does not expose an embeddings endpoint, so keep the
  # `embed` role on github_models / openai_compatible for vector search.
